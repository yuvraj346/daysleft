<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Year Progress · Dot Grid</title>
    <meta name="description" content="Visualize your year's progress with an elegant dot grid calendar. Track each day with a beautiful, responsive interface.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        /* ==============================
           CSS RESET & VARIABLES
        ============================== */
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            /* Dark Mode (Default) */
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-card: rgba(255, 255, 255, 0.03);
            --bg-card-hover: rgba(255, 255, 255, 0.06);
            --text-primary: #f0f0f5;
            --text-secondary: #8888a0;
            --text-muted: #555570;
            --dot-past: #e8e8f0;
            --dot-future: #2a2a3a;
            --dot-future-border: #3a3a4a;
            --dot-current: #ff3b5c;
            --dot-current-glow: rgba(255, 59, 92, 0.6);
            --dot-current-glow-outer: rgba(255, 59, 92, 0.2);
            --accent: #ff3b5c;
            --accent-dim: rgba(255, 59, 92, 0.15);
            --progress-bg: rgba(255, 255, 255, 0.06);
            --progress-fill: linear-gradient(90deg, #ff3b5c, #ff6b8a, #ff3b5c);
            --border: rgba(255, 255, 255, 0.06);
            --tooltip-bg: rgba(20, 20, 30, 0.95);
            --tooltip-border: rgba(255, 255, 255, 0.1);
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            --toggle-bg: rgba(255, 255, 255, 0.08);
            --mode-switch-bg: rgba(255, 255, 255, 0.05);
        }

        :root.light-mode {
            --bg-primary: #f5f5f8;
            --bg-secondary: #ffffff;
            --bg-card: rgba(0, 0, 0, 0.02);
            --bg-card-hover: rgba(0, 0, 0, 0.04);
            --text-primary: #1a1a2e;
            --text-secondary: #6b6b80;
            --text-muted: #9999aa;
            --dot-past: #2a2a3e;
            --dot-future: #d8d8e2;
            --dot-future-border: #c8c8d2;
            --dot-current: #ff3b5c;
            --dot-current-glow: rgba(255, 59, 92, 0.5);
            --dot-current-glow-outer: rgba(255, 59, 92, 0.15);
            --accent: #ff3b5c;
            --accent-dim: rgba(255, 59, 92, 0.1);
            --progress-bg: rgba(0, 0, 0, 0.06);
            --progress-fill: linear-gradient(90deg, #ff3b5c, #ff6b8a, #ff3b5c);
            --border: rgba(0, 0, 0, 0.06);
            --tooltip-bg: rgba(255, 255, 255, 0.97);
            --tooltip-border: rgba(0, 0, 0, 0.1);
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            --toggle-bg: rgba(0, 0, 0, 0.06);
            --mode-switch-bg: rgba(0, 0, 0, 0.04);
        }

        /* ==============================
           BASE STYLES
        ============================== */
        html {
            font-size: 16px;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            transition: background 0.4s ease, color 0.4s ease;
        }

        /* Ambient background glow */
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 50% 30%, var(--dot-current-glow-outer) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
            opacity: 0.5;
        }

        /* ==============================
           LAYOUT
        ============================== */
        .app-container {
            position: relative;
            z-index: 1;
            max-width: 520px;
            margin: 0 auto;
            padding: 20px 16px 40px;
            min-height: 100vh;
        }

        /* ==============================
           TOP BAR
        ============================== */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 28px;
            padding: 0 4px;
        }

        .app-title {
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--text-muted);
        }

        .controls {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .mode-btn {
            background: var(--toggle-bg);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            width: 36px;
            height: 36px;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            transition: all 0.3s ease;
            position: relative;
        }

        .mode-btn:hover {
            background: var(--bg-card-hover);
            color: var(--text-primary);
            transform: translateY(-1px);
        }

        .mode-btn .icon {
            transition: transform 0.3s ease;
        }

        .mode-btn:active .icon {
            transform: scale(0.85);
        }

        /* ==============================
           DATE & STATS HEADER
        ============================== */
        .header-section {
            text-align: center;
            margin-bottom: 32px;
        }

        .current-date {
            font-size: 1.1rem;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 6px;
            letter-spacing: 0.5px;
        }

        .year-display {
            font-size: 3.2rem;
            font-weight: 900;
            letter-spacing: -2px;
            color: var(--text-primary);
            line-height: 1;
            margin-bottom: 12px;
        }

        .stats-row {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin-bottom: 4px;
        }

        .stat-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .stat-value {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--text-primary);
            line-height: 1.2;
        }

        .stat-value .accent {
            color: var(--accent);
        }

        .stat-label {
            font-size: 0.65rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .stat-divider {
            width: 1px;
            height: 36px;
            background: var(--border);
            align-self: center;
        }

        /* ==============================
           PROGRESS BAR
        ============================== */
        .progress-section {
            margin-bottom: 28px;
            padding: 0 4px;
        }

        .progress-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 8px;
        }

        .progress-label {
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-muted);
        }

        .progress-percent {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--accent);
        }

        .progress-track {
            width: 100%;
            height: 6px;
            background: var(--progress-bg);
            border-radius: 100px;
            overflow: hidden;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            background: var(--progress-fill);
            background-size: 200% 100%;
            border-radius: 100px;
            transition: width 1s cubic-bezier(0.25, 0.8, 0.25, 1);
            position: relative;
            animation: shimmer 3s ease-in-out infinite;
        }

        .progress-fill::after {
            content: '';
            position: absolute;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--accent);
            box-shadow: 0 0 12px var(--dot-current-glow);
        }

        @keyframes shimmer {
            0%, 100% { background-position: 0% 0%; }
            50% { background-position: 100% 0%; }
        }

        /* ==============================
           DOT GRID
        ============================== */
        .grid-container {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 20px 16px;
            margin-bottom: 24px;
            backdrop-filter: blur(10px);
        }

        .dot-grid {
            display: grid;
            grid-template-columns: repeat(20, 1fr);
            gap: 5px;
            justify-items: center;
            align-items: center;
        }

        .dot {
            width: 100%;
            aspect-ratio: 1;
            max-width: 18px;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.25, 0.8, 0.25, 1);
            position: relative;
            opacity: 0;
            animation: dotFadeIn 0.4s ease forwards;
        }

        .dot.past {
            background: var(--dot-past);
        }

        .dot.future {
            background: var(--dot-future);
            border: 1px solid var(--dot-future-border);
        }

        .dot.current {
            background: var(--dot-current);
            box-shadow: 0 0 8px var(--dot-current-glow), 0 0 24px var(--dot-current-glow-outer);
            animation: dotFadeIn 0.4s ease forwards, currentPulse 2.5s ease-in-out infinite;
            z-index: 2;
        }

        .dot:hover {
            transform: scale(1.8);
            z-index: 10;
        }

        .dot.past:hover {
            background: #ffffff;
            box-shadow: 0 0 12px rgba(255, 255, 255, 0.3);
        }

        .dot.future:hover {
            background: var(--dot-future-border);
            box-shadow: 0 0 8px rgba(255, 255, 255, 0.1);
        }

        .dot.current:hover {
            transform: scale(2.2);
            box-shadow: 0 0 16px var(--dot-current-glow), 0 0 40px var(--dot-current-glow-outer);
        }

        .dot:active {
            transform: scale(1.5);
        }

        @keyframes dotFadeIn {
            from {
                opacity: 0;
                transform: scale(0.3);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes currentPulse {
            0%, 100% {
                box-shadow: 0 0 8px var(--dot-current-glow), 0 0 24px var(--dot-current-glow-outer);
            }
            50% {
                box-shadow: 0 0 16px var(--dot-current-glow), 0 0 40px var(--dot-current-glow-outer), 0 0 60px rgba(255, 59, 92, 0.1);
            }
        }

        /* ==============================
           TOOLTIP
        ============================== */
        .tooltip {
            position: fixed;
            background: var(--tooltip-bg);
            border: 1px solid var(--tooltip-border);
            border-radius: 12px;
            padding: 10px 14px;
            pointer-events: none;
            z-index: 1000;
            opacity: 0;
            transform: translateY(8px) scale(0.95);
            transition: all 0.2s cubic-bezier(0.25, 0.8, 0.25, 1);
            backdrop-filter: blur(20px);
            box-shadow: var(--shadow);
            min-width: 140px;
            text-align: center;
        }

        .tooltip.visible {
            opacity: 1;
            transform: translateY(0) scale(1);
        }

        .tooltip-date {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 2px;
        }

        .tooltip-day {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            font-weight: 500;
            color: var(--text-muted);
        }

        .tooltip-status {
            font-size: 0.65rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 4px;
            padding: 2px 8px;
            border-radius: 4px;
            display: inline-block;
        }

        .tooltip-status.past {
            color: var(--dot-past);
            background: rgba(255, 255, 255, 0.05);
        }

        .tooltip-status.current {
            color: var(--accent);
            background: var(--accent-dim);
        }

        .tooltip-status.future {
            color: var(--text-muted);
            background: rgba(255, 255, 255, 0.03);
        }

        /* ==============================
           MODE SWITCHER (Year / Life)
        ============================== */
        .mode-switcher {
            display: flex;
            background: var(--mode-switch-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 4px;
            margin-bottom: 24px;
        }

        .mode-switcher button {
            flex: 1;
            padding: 10px 16px;
            border: none;
            background: transparent;
            color: var(--text-muted);
            font-family: 'Inter', sans-serif;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            cursor: pointer;
            border-radius: 9px;
            transition: all 0.3s ease;
        }

        .mode-switcher button.active {
            background: var(--accent);
            color: #ffffff;
            box-shadow: 0 2px 12px var(--dot-current-glow);
        }

        .mode-switcher button:not(.active):hover {
            color: var(--text-secondary);
            background: var(--bg-card-hover);
        }

        /* ==============================
           LIFE CALENDAR
        ============================== */
        .life-calendar-container {
            display: none;
        }

        .life-calendar-container.active {
            display: block;
        }

        .life-header {
            text-align: center;
            margin-bottom: 20px;
        }

        .life-header h2 {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 4px;
        }

        .life-header p {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .life-input-row {
            display: flex;
            gap: 12px;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .life-input-row label {
            font-size: 0.72rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
        }

        .life-input-row input {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 8px 12px;
            color: var(--text-primary);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            width: 150px;
            text-align: center;
            outline: none;
            transition: border 0.3s ease;
        }

        .life-input-row input:focus {
            border-color: var(--accent);
        }

        .life-grid-wrapper {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 16px 12px;
            overflow-x: auto;
        }

        .life-grid-labels {
            display: flex;
            gap: 2px;
            margin-bottom: 6px;
            padding-left: 30px;
        }

        .life-axis-label {
            font-size: 0.5rem;
            color: var(--text-muted);
            font-family: 'JetBrains Mono', monospace;
            text-align: center;
        }

        .life-row {
            display: flex;
            align-items: center;
            gap: 2px;
            margin-bottom: 1px;
        }

        .life-row-label {
            font-size: 0.45rem;
            color: var(--text-muted);
            font-family: 'JetBrains Mono', monospace;
            width: 26px;
            text-align: right;
            flex-shrink: 0;
            padding-right: 4px;
        }

        .life-dot {
            width: 5px;
            height: 5px;
            border-radius: 1px;
            flex-shrink: 0;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .life-dot.lived {
            background: var(--dot-past);
        }

        .life-dot.current-year {
            background: var(--accent);
            box-shadow: 0 0 4px var(--dot-current-glow);
        }

        .life-dot.remaining {
            background: var(--dot-future);
            border: 0.5px solid var(--dot-future-border);
        }

        .life-dot:hover {
            transform: scale(2.5);
            z-index: 10;
        }

        .life-stats {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 16px;
            flex-wrap: wrap;
        }

        .life-stat {
            text-align: center;
        }

        .life-stat-value {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        .life-stat-label {
            font-size: 0.6rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
        }

        /* ==============================
           YEAR GRID CONTAINER (toggle)
        ============================== */
        .year-grid-container {
            display: block;
        }

        .year-grid-container.hidden {
            display: none;
        }

        /* ==============================
           FOOTER
        ============================== */
        .footer {
            text-align: center;
            padding: 20px 0 10px;
        }

        .footer-text {
            font-size: 0.65rem;
            color: var(--text-muted);
            letter-spacing: 1px;
        }

        /* ==============================
           MONTH MARKERS
        ============================== */
        .month-markers {
            display: flex;
            justify-content: space-between;
            padding: 8px 4px 0;
            flex-wrap: wrap;
            gap: 2px;
        }

        .month-marker {
            font-size: 0.55rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
            opacity: 0.6;
        }

        /* ==============================
           RESPONSIVE
        ============================== */
        @media (max-width: 400px) {
            .app-container {
                padding: 16px 10px 32px;
            }

            .dot-grid {
                grid-template-columns: repeat(18, 1fr);
                gap: 4px;
            }

            .year-display {
                font-size: 2.6rem;
            }

            .stats-row {
                gap: 16px;
            }

            .stat-value {
                font-size: 1.3rem;
            }

            .grid-container {
                padding: 16px 12px;
                border-radius: 16px;
            }

            .life-dot {
                width: 4px;
                height: 4px;
            }
        }

        @media (min-width: 401px) and (max-width: 520px) {
            .dot-grid {
                gap: 5px;
            }
        }

        @media (min-width: 521px) {
            .dot {
                max-width: 16px;
            }

            .dot-grid {
                gap: 6px;
            }
        }

        /* ==============================
           SCROLLBAR (subtle)
        ============================== */
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }

        /* ==============================
           SELECTION
        ============================== */
        ::selection {
            background: var(--accent-dim);
            color: var(--accent);
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Top Bar -->
        <div class="top-bar">
            <span class="app-title">Year Progress</span>
            <div class="controls">
                <button class="mode-btn" id="themeToggle" aria-label="Toggle theme">
                    <span class="icon" id="themeIcon">🌙</span>
                </button>
            </div>
        </div>

        <!-- Header Section -->
        <div class="header-section">
            <div class="current-date" id="currentDate"></div>
            <div class="year-display" id="yearDisplay"></div>
            <div class="stats-row">
                <div class="stat-item">
                    <div class="stat-value" id="dayNumber">—</div>
                    <div class="stat-label">Day</div>
                </div>
                <div class="stat-divider"></div>
                <div class="stat-item">
                    <div class="stat-value" id="daysLeft">—</div>
                    <div class="stat-label">Remaining</div>
                </div>
                <div class="stat-divider"></div>
                <div class="stat-item">
                    <div class="stat-value"><span class="accent" id="percentComplete">—</span></div>
                    <div class="stat-label">Complete</div>
                </div>
            </div>
        </div>

        <!-- Progress Bar -->
        <div class="progress-section">
            <div class="progress-header">
                <span class="progress-label">Progress</span>
                <span class="progress-percent" id="progressPercent">0%</span>
            </div>
            <div class="progress-track">
                <div class="progress-fill" id="progressFill" style="width: 0%"></div>
            </div>
        </div>

        <!-- Mode Switcher -->
        <div class="mode-switcher">
            <button id="yearModeBtn" class="active">Year Grid</button>
            <button id="lifeModeBtn">Life Calendar</button>
        </div>

        <!-- Year Dot Grid -->
        <div class="year-grid-container" id="yearGridContainer">
            <div class="grid-container">
                <div class="dot-grid" id="dotGrid"></div>
            </div>
        </div>

        <!-- Life Calendar -->
        <div class="life-calendar-container" id="lifeCalendarContainer">
            <div class="life-header">
                <h2>Life in Weeks</h2>
                <p>Each dot = 1 year of your life (90 years)</p>
            </div>
            <div class="life-input-row">
                <label for="birthDateInput">Your Birth Date</label>
                <input type="date" id="birthDateInput">
            </div>
            <div class="life-grid-wrapper">
                <div id="lifeGrid"></div>
            </div>
            <div class="life-stats" id="lifeStats"></div>
        </div>

        <!-- Footer -->
        <div class="footer">
            <div class="footer-text">MAKE EVERY DOT COUNT</div>
        </div>
    </div>

    <!-- Tooltip -->
    <div class="tooltip" id="tooltip">
        <div class="tooltip-date" id="tooltipDate"></div>
        <div class="tooltip-day" id="tooltipDay"></div>
        <div class="tooltip-status" id="tooltipStatus"></div>
    </div>

    <script>
        /* ==============================
           STATE & CONFIG
        ============================== */
        const LIFE_EXPECTANCY = 90;
        let currentMode = 'year'; // 'year' or 'life'
        let lastRenderedDay = -1;

        /* ==============================
           UTILITY FUNCTIONS
        ============================== */
        function isLeapYear(year) {
            return (year % 4 === 0 && year % 100 !== 0) || (year % 400 === 0);
        }

        function getDaysInYear(year) {
            return isLeapYear(year) ? 366 : 365;
        }

        function getDayOfYear(date) {
            const start = new Date(date.getFullYear(), 0, 0);
            const diff = date - start;
            const oneDay = 1000 * 60 * 60 * 24;
            return Math.floor(diff / oneDay);
        }

        function getDateFromDayNumber(year, dayNum) {
            const date = new Date(year, 0);
            date.setDate(dayNum);
            return date;
        }

        function formatDate(date) {
            const days = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
            const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun',
                            'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
            return `${days[date.getDay()]} ${date.getDate()} ${months[date.getMonth()]}`;
        }

        function formatFullDate(date) {
            const days = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
            const months = ['January', 'February', 'March', 'April', 'May', 'June',
                            'July', 'August', 'September', 'October', 'November', 'December'];
            return `${days[date.getDay()]}, ${date.getDate()} ${months[date.getMonth()]} ${date.getFullYear()}`;
        }

        /* ==============================
           THEME MANAGEMENT
        ============================== */
        function initTheme() {
            const saved = localStorage.getItem('yearProgress_theme');
            if (saved === 'light') {
                document.documentElement.classList.add('light-mode');
                document.getElementById('themeIcon').textContent = '☀️';
            }
        }

        function toggleTheme() {
            const html = document.documentElement;
            html.classList.toggle('light-mode');
            const isLight = html.classList.contains('light-mode');
            document.getElementById('themeIcon').textContent = isLight ? '☀️' : '🌙';
            localStorage.setItem('yearProgress_theme', isLight ? 'light' : 'dark');
        }

        /* ==============================
           YEAR GRID RENDERING
        ============================== */
        function renderYearGrid() {
            const now = new Date();
            const year = now.getFullYear();
            const totalDays = getDaysInYear(year);
            const currentDay = getDayOfYear(now);

            // Avoid re-render if same day
            if (currentDay === lastRenderedDay) return;
            lastRenderedDay = currentDay;

            // Update header
            document.getElementById('currentDate').textContent = formatDate(now);
            document.getElementById('yearDisplay').textContent = year;
            document.getElementById('dayNumber').textContent = currentDay;
            document.getElementById('daysLeft').textContent = totalDays - currentDay;

            const percent = ((currentDay / totalDays) * 100).toFixed(1);
            document.getElementById('percentComplete').textContent = percent + '%';
            document.getElementById('progressPercent').textContent = percent + '%';

            // Animate progress bar
            requestAnimationFrame(() => {
                document.getElementById('progressFill').style.width = percent + '%';
            });

            // Build grid
            const grid = document.getElementById('dotGrid');
            grid.innerHTML = '';

            for (let i = 1; i <= totalDays; i++) {
                const dot = document.createElement('div');
                dot.classList.add('dot');
                dot.dataset.day = i;

                if (i < currentDay) {
                    dot.classList.add('past');
                } else if (i === currentDay) {
                    dot.classList.add('current');
                } else {
                    dot.classList.add('future');
                }

                // Stagger animation
                dot.style.animationDelay = `${(i * 2)}ms`;

                // Touch/click handler
                dot.addEventListener('click', (e) => showTooltip(e, i, year, currentDay));
                dot.addEventListener('mouseenter', (e) => showTooltip(e, i, year, currentDay));
                dot.addEventListener('mouseleave', hideTooltip);
                dot.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    showTooltip(e, i, year, currentDay);
                    setTimeout(hideTooltip, 2500);
                }, { passive: false });

                grid.appendChild(dot);
            }
        }

        /* ==============================
           TOOLTIP
        ============================== */
        function showTooltip(event, dayNum, year, currentDay) {
            const tooltip = document.getElementById('tooltip');
            const date = getDateFromDayNumber(year, dayNum);

            document.getElementById('tooltipDate').textContent = formatFullDate(date);
            document.getElementById('tooltipDay').textContent = `Day ${dayNum} of ${getDaysInYear(year)}`;

            const statusEl = document.getElementById('tooltipStatus');
            statusEl.className = 'tooltip-status';

            if (dayNum < currentDay) {
                statusEl.textContent = '● Passed';
                statusEl.classList.add('past');
            } else if (dayNum === currentDay) {
                statusEl.textContent = '● Today';
                statusEl.classList.add('current');
            } else {
                statusEl.textContent = '○ Upcoming';
                statusEl.classList.add('future');
            }

            // Position tooltip
            const rect = event.target.getBoundingClientRect();
            const tooltipEl = tooltip;
            tooltipEl.classList.add('visible');

            const tooltipRect = tooltipEl.getBoundingClientRect();
            let left = rect.left + rect.width / 2 - tooltipRect.width / 2;
            let top = rect.top - tooltipRect.height - 10;

            // Adjust if off-screen
            if (left < 8) left = 8;
            if (left + tooltipRect.width > window.innerWidth - 8) {
                left = window.innerWidth - tooltipRect.width - 8;
            }
            if (top < 8) {
                top = rect.bottom + 10;
            }

            tooltipEl.style.left = left + 'px';
            tooltipEl.style.top = top + 'px';
        }

        function hideTooltip() {
            document.getElementById('tooltip').classList.remove('visible');
        }

        /* ==============================
           LIFE CALENDAR
        ============================== */
        function initLifeCalendar() {
            const saved = localStorage.getItem('yearProgress_birthDate');
            if (saved) {
                document.getElementById('birthDateInput').value = saved;
                renderLifeCalendar(new Date(saved));
            } else {
                // Default: show empty grid with a placeholder
                renderLifeCalendar(null);
            }
        }

        function renderLifeCalendar(birthDate) {
            const grid = document.getElementById('lifeGrid');
            const statsEl = document.getElementById('lifeStats');
            grid.innerHTML = '';
            statsEl.innerHTML = '';

            const now = new Date();
            let yearsLived = 0;
            let weeksLived = 0;

            if (birthDate) {
                const ageDiff = now - birthDate;
                yearsLived = Math.floor(ageDiff / (1000 * 60 * 60 * 24 * 365.25));
                weeksLived = Math.floor(ageDiff / (1000 * 60 * 60 * 24 * 7));
            }

            const totalWeeks = LIFE_EXPECTANCY * 52;
            const weeksPerRow = 52; // 52 weeks per year

            for (let year = 0; year < LIFE_EXPECTANCY; year++) {
                const row = document.createElement('div');
                row.classList.add('life-row');

                const label = document.createElement('span');
                label.classList.add('life-row-label');
                if (year % 10 === 0) {
                    label.textContent = year;
                }
                row.appendChild(label);

                for (let week = 0; week < weeksPerRow; week++) {
                    const dot = document.createElement('div');
                    dot.classList.add('life-dot');

                    const totalWeek = year * 52 + week;

                    if (birthDate) {
                        if (year < yearsLived) {
                            dot.classList.add('lived');
                        } else if (year === yearsLived) {
                            const currentWeekInYear = Math.floor((now - new Date(birthDate.getFullYear() + yearsLived, birthDate.getMonth(), birthDate.getDate())) / (1000 * 60 * 60 * 24 * 7));
                            if (week <= currentWeekInYear) {
                                dot.classList.add('current-year');
                            } else {
                                dot.classList.add('remaining');
                            }
                        } else {
                            dot.classList.add('remaining');
                        }
                    } else {
                        dot.classList.add('remaining');
                    }

                    row.appendChild(dot);
                }

                grid.appendChild(row);
            }

            if (birthDate) {
                const totalWeeksLeft = totalWeeks - weeksLived;
                const percentLived = ((weeksLived / totalWeeks) * 100).toFixed(1);

                statsEl.innerHTML = `
                    <div class="life-stat">
                        <div class="life-stat-value">${yearsLived}</div>
                        <div class="life-stat-label">Years Lived</div>
                    </div>
                    <div class="life-stat">
                        <div class="life-stat-value">${weeksLived.toLocaleString()}</div>
                        <div class="life-stat-label">Weeks Lived</div>
                    </div>
                    <div class="life-stat">
                        <div class="life-stat-value">${totalWeeksLeft.toLocaleString()}</div>
                        <div class="life-stat-label">Weeks Left</div>
                    </div>
                    <div class="life-stat">
                        <div class="life-stat-value" style="color: var(--accent)">${percentLived}%</div>
                        <div class="life-stat-label">Life Spent</div>
                    </div>
                `;
            }
        }

        /* ==============================
           MODE SWITCHING
        ============================== */
        function switchMode(mode) {
            currentMode = mode;
            const yearBtn = document.getElementById('yearModeBtn');
            const lifeBtn = document.getElementById('lifeModeBtn');
            const yearContainer = document.getElementById('yearGridContainer');
            const lifeContainer = document.getElementById('lifeCalendarContainer');

            if (mode === 'year') {
                yearBtn.classList.add('active');
                lifeBtn.classList.remove('active');
                yearContainer.classList.remove('hidden');
                lifeContainer.classList.remove('active');
            } else {
                lifeBtn.classList.add('active');
                yearBtn.classList.remove('active');
                yearContainer.classList.add('hidden');
                lifeContainer.classList.add('active');
                initLifeCalendar();
            }

            localStorage.setItem('yearProgress_mode', mode);
        }

        /* ==============================
           AUTO-UPDATE (midnight check)
        ============================== */
        function scheduleNextUpdate() {
            const now = new Date();
            const tomorrow = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1);
            const msUntilMidnight = tomorrow - now;

            setTimeout(() => {
                lastRenderedDay = -1; // Force re-render
                renderYearGrid();
                scheduleNextUpdate(); // Schedule next midnight
            }, msUntilMidnight + 1000); // +1s buffer
        }

        // Also check every minute for robustness
        function startPeriodicCheck() {
            setInterval(() => {
                const now = new Date();
                const currentDay = getDayOfYear(now);
                if (currentDay !== lastRenderedDay) {
                    renderYearGrid();
                }
            }, 60000); // Every 60 seconds
        }

        /* ==============================
           EVENT LISTENERS
        ============================== */
        function initEventListeners() {
            // Theme toggle
            document.getElementById('themeToggle').addEventListener('click', toggleTheme);

            // Mode switch
            document.getElementById('yearModeBtn').addEventListener('click', () => switchMode('year'));
            document.getElementById('lifeModeBtn').addEventListener('click', () => switchMode('life'));

            // Birth date input
            document.getElementById('birthDateInput').addEventListener('change', (e) => {
                const val = e.target.value;
                if (val) {
                    localStorage.setItem('yearProgress_birthDate', val);
                    renderLifeCalendar(new Date(val));
                }
            });

            // Dismiss tooltip on body click
            document.body.addEventListener('click', (e) => {
                if (!e.target.classList.contains('dot')) {
                    hideTooltip();
                }
            });

            // Handle visibility change (re-check when tab becomes visible)
            document.addEventListener('visibilitychange', () => {
                if (!document.hidden) {
                    const currentDay = getDayOfYear(new Date());
                    if (currentDay !== lastRenderedDay) {
                        renderYearGrid();
                    }
                }
            });
        }

        /* ==============================
           INITIALIZATION
        ============================== */
        function init() {
            initTheme();
            renderYearGrid();
            initEventListeners();

            // Restore mode
            const savedMode = localStorage.getItem('yearProgress_mode');
            if (savedMode === 'life') {
                switchMode('life');
            }

            // Start auto-update
            scheduleNextUpdate();
            startPeriodicCheck();
        }

        // Run on DOM ready
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    </script>
</body>
</html>
